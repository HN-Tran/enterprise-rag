apiVersion: v1
kind: ConfigMap
metadata:
  name: enterprise-rag
  namespace: placebo
data:
  # Neo4j
  USE_NEO4J: "true"
  NEO4J_URI: "bolt://graphdb.placebo.svc:7687"
  NEO4J_USER: "neo4j"

  # Embeddings
  EMBED_BASE_URL: "http://ollama.infra.svc.cluster.local:11434/v1"
  EMBED_MODEL: "qwen3-embedding-8b"
  EMBED_API_KEY: ""
  EMBED_DIM: "4096"

  # Reranker (TEI)
  RERANK_ENABLED: "true"
  RERANK_BASE_URL: "http://reranker.infra.svc.cluster.local:9001"
  RERANK_MODEL: "BAAI/bge-reranker-v2-m3"
  RERANK_API_KEY: ""
  RERANK_CHARS_PER_DOC: "1500"

  # LLM
  LLM_BASE_URL: "http://ollama.infra.svc.cluster.local:11434/v1"
  LLM_MODEL: "qwen3-32b-instruct"
  LLM_API_KEY: ""
  LLM_CONTEXT_LENGTH: "16000"
  LLM_MAX_ANSWER_TOKENS: "500"

  # Ingestion / windowing
  WINDOW_PAGES: "2"
  WINDOW_STRIDE: "1"
  MAX_WINDOW_CHARS: "24000"
  MAX_ANCHOR_CHARS: "2000"

  # Retrieval
  CANDIDATES_BM25: "120"
  CANDIDATES_VEC: "120"
  RERANK_KEEP: "18"
  MAX_PER_DOC: "2"
  MAX_QUERY_REWRITES: "6"
  CATEGORY_BOOST: "1.20"

  # Context packing
  PACK_MAX_SOURCES: "8"
  PACK_CHARS_PER_SOURCE: "3000"
  PACK_MAX_CITED_DOCS: "2"

  # Evidence extraction
  EVIDENCE_MAX_WINDOWS: "4"
  EVIDENCE_CHARS_PER_WINDOW: "1000"
  EVIDENCE_MAX_ANCHORS: "2"
  EVIDENCE_CHARS_PER_ANCHOR: "600"
  EVIDENCE_FALLBACK_ANSWER_CHARS: "3000"
  EVIDENCE_FALLBACK_SNIPPET_CHARS: "200"

  # Model profile
  MODEL_PROFILE: ""

  # Dynamic context
  DYNAMIC_CONTEXT: "true"
  DYNAMIC_MIN_MULTIPLIER: "0.5"
  DYNAMIC_MAX_MULTIPLIER: "1.5"

  # Connection pooling
  DB_POOL_MIN: "5"
  DB_POOL_MAX: "20"
  DB_POOL_TIMEOUT: "30.0"

  # Caching
  CACHE_EMBED_TTL: "86400"
  CACHE_QUERY_TTL: "3600"
  ASYNC_INGEST: "false"

  # Observability
  LOG_JSON: "true"
  LOG_LEVEL: "INFO"

  # Versioning
  INCLUDE_ARCHIVED_BY_DEFAULT: "false"
  VERSION_OVERLAP_ENABLED: "true"
  VERSION_OVERLAP_MODE: "auto"
  VERSION_EMBEDDING_THRESHOLD: "0.95"
  VERSION_TEXT_OVERLAP_THRESHOLD: "0.80"
